name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and build tools
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall src tests
      - name: Publish hygiene
        run: python -m refgate publish-check --root . --json
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: refgate-dist
          path: dist/*
